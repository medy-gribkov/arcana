changelog:
  exclude:
    labels:
      - dependencies
      - documentation
      - chore
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: New Skills
      labels:
        - new-skill
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Other Changes
      labels:
        - "*"
