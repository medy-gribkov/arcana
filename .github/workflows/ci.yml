name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: cli

      - run: pnpm run build
        working-directory: cli

      - name: Validate all skills (structure + security)
        run: node dist/index.js validate --all --source ../skills --json
        working-directory: cli

      - name: Cross-validate marketplace
        run: node dist/index.js validate --all --source ../skills --cross --json
        working-directory: cli

      - name: Quality gate (min score 40)
        run: node dist/index.js validate --all --source ../skills --min-score 40 --json
        working-directory: cli

      - name: Run skill tests
        run: |
          has_tests=false
          for test_file in skills/*/scripts/test_*.py; do
            [ -f "$test_file" ] || continue
            has_tests=true
            echo "=== Running $(basename $test_file) ==="
            python3 "$test_file" -v
          done
          if [ "$has_tests" = false ]; then
            echo "No skill tests found."
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run security scan
        run: bash scripts/security-scan.sh

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile
        working-directory: cli

      - run: pnpm audit --prod
        working-directory: cli

  cli-build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: cli

      - name: Lint
        run: pnpm run lint
        working-directory: cli

      - name: Format check
        run: pnpm run format:check
        working-directory: cli

      - name: Type check
        run: pnpm exec tsc --noEmit
        working-directory: cli

      - name: Unit tests with coverage
        run: pnpm exec vitest run --coverage
        working-directory: cli

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cli/coverage/

      - name: Smoke test
        run: |
          pnpm run build
          node dist/index.js --version
          node dist/index.js --help
        working-directory: cli
